project_name: "object_detection_benchmark"
output_dir: "./runs"
seed: 42

# Data is merged + resized by `data_engine/prepare.py`.
# Augmentation is applied during training via Ultralytics (see `models/base_trainer.py`).
datasets:
  public:
    root: "./raw_data/public_dataset"
    train_subdir: "images/train"
    val_subdir: "images/valid"

  private:
    root: "./raw_data/private_dataset"
    train_subdir: "images/train"
    val_subdir: "images/valid"
    test_subdir: "images/test"

data_engine:
  target_path: "./processed_data"
  img_size: 640
  augmentation:
    enable: True
    prob: 0.5
    params:
      brightness_contrast: 0.2
      shift_scale_rotate: True
      perspective: True
      shear: True

classes:
  0: "license"

models:
  yolov11:
    model_name: "yolo11l.pt"
    epochs: 100
    batch: 16
    patience: 10
    optimizer: "auto" # auto, sgd, adam, adamw, rmsprop, ...
    lr: 0.01          # base learning rate (mapped to Ultralytics `lr0`)
    amp: True         # mixed precision training (Ultralytics `amp`)
    cache: False      # dataset caching (Ultralytics `cache`)

  yolov10:
    model_name: "yolov10l.pt"
    epochs: 100
    batch: 16
    patience: 10
    optimizer: "auto"
    lr: 0.01
    amp: True
    cache: False

  rtdetrv2:
    model_name: "rtdetr-l.pt"
    epochs: 100
    batch: 16
    patience: 10
    optimizer: "auto"
    lr: 0.0001
    amp: True
    cache: False
